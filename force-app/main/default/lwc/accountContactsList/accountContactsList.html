<template>
    <lightning-card title="Contactos de la cuenta" icon-name="standard:contact">
        <lightning-button
                slot="actions"
                label="Nuevo contacto"
                variant="brand"
                onclick={handleNewContact}>
        </lightning-button>

        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <template if:true={hasData}>
                <lightning-datatable
                        key-field="Id"
                        data={contacts}
                        columns={columns}
                        hide-checkbox-column
                        sorted-by={sortedBy}
                        sorted-direction={sortDirection}
                        onsort={handleSort}
                        onrowaction={handleRowAction}>
                </lightning-datatable>
            </template>

            <template if:true={isEmpty}>
                <p>No hay contactos asociados a esta cuenta.</p>
            </template>

            <template if:true={hasError}>
                <p class="slds-text-color_error">
                    Error cargando contactos.
                </p>
            </template>
        </div>
    </lightning-card>

    <template if:true={isModalOpen}>
        <section
                role="dialog"
                tabindex="-1"
                aria-modal="true"
                aria-label={modalTitle}
                class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                            icon-name="utility:close"
                            alternative-text="Cerrar"
                            onclick={closeModal}
                            class="slds-modal__close">
                    </lightning-button-icon>
                    <h2 class="slds-text-heading_medium">{modalTitle}</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form
                            object-api-name="Contact"
                            record-id={editRecordId}
                            onsuccess={handleSuccess}
                            onerror={handleError}
                            onsubmit={handleSubmit}>

                        <lightning-messages></lightning-messages>

                        <lightning-input-field field-name="FirstName"></lightning-input-field>
                        <lightning-input-field field-name="LastName"></lightning-input-field>
                        <lightning-input-field field-name="Phone"></lightning-input-field>
                        <lightning-input-field field-name="Email"></lightning-input-field>
                        <lightning-input-field field-name="Title"></lightning-input-field>

                        <div class="slds-modal__footer slds-p-top_medium">
                            <lightning-button
                                    label="Cancelar"
                                    onclick={closeModal}
                                    class="slds-m-right_small">
                            </lightning-button>

                            <lightning-button
                                    type="submit"
                                    variant="brand"
                                    label={submitLabel}>
                            </lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
